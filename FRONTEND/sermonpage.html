<script>
    //searching within strings and arrays
  //search fruit
  const fruits=[
    {name:"Mango",price:40},
    {name:"Apple",price:50},
    {name:"Banana",price:5},
    {name:"Guava",price:15},
    {name:"Pineapple",price:70},
    {name:"Kiwi",price:30}
  ];
  const searchItem="ap";
  const findItem=fruits.filter(item=>
    item.name.toLowerCase().includes(searchItem.toLowerCase())
  );
  console.log(findItem);
</script>
