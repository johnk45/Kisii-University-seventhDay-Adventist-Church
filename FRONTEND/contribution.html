<section class="contribution-section">
  <h2>Semetary Contribution</h2>
  <p>Your contribution helps us maintain the church Semetary with dignity and care.</p>

  <form class="contribution-form">
    <!-- Name -->
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="name" placeholder="Enter your full name" required>

    <!-- Contribution Amount -->
    <label for="amount">Contribution Amount (Ksh):</label>
    <input type="number" id="amount" name="amount" placeholder="e.g. 1000" required>

    <!-- Contribution Type -->
    <label for="type">Contribution Type:</label>
    <select id="type" name="type" required>
      <option value="">-- Select --</option>
      <option value="once">One-semester</option>
      <option value="monthly">Two_semester</option>

    </select>

    <!-- Payment Method -->
    <label for="method">Payment Method:</label>
    <select id="method" name="method" required>
      <option value="">-- Select Method --</option>
      <option value="mpesa">M-Pesa</option>
      <option value="bank">Bank Transfer</option>
      <option value="cash">Cash</option>
    </select>

    <!-- Submit Button -->
    <button type="submit">Contribute</button>
  </form>
</section>
