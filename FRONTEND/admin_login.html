<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #4e54c8 0%, #8f94fb 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: rgba(255,255,255,0.97);
            padding: 40px 32px 32px 32px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(44,62,80,0.18);
            max-width: 350px;
            width: 100%;
        }
        .login-container h2 {
            text-align: center;
            color: #4e54c8;
            margin-bottom: 24px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 500;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 1.5px solid #bfc9ea;
            border-radius: 8px;
            font-size: 1rem;
            background: #f7f8fa;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #4e54c8;
            background: #eef2fb;
        }
        button[type="submit"] {
            width: 100%;
            padding: 13px;
            background: linear-gradient(90deg, #4e54c8 60%, #8f94fb 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.08rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(44,62,80,0.08);
            transition: background 0.3s, box-shadow 0.3s;
        }
        button[type="submit"]:hover {
            background: linear-gradient(90deg, #8f94fb 60%, #4e54c8 100%);
            box-shadow: 0 4px 16px rgba(44,62,80,0.12);
        }
        .note {
            text-align: center;
            color: #888;
            font-size: 0.98rem;
            margin-bottom: 18px;
        }
        @media (max-width: 500px) {
            .login-container {
                padding: 18px 8px 18px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Church Admin Login</h2>
        <div class="note">
            Church leaders can view and manage registered members here.
        </div>
        <form action="admin_login.php" method="POST" autocomplete="off">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" required>

            <label for="password">Password</label>
            <input type="password" name="password" id="password" required>

            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
