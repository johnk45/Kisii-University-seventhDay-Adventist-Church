<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .calender-section{
            padding:40px;
            background-color: #f9f9f9;
            text-align:center;
        }
        .calender-section h2{
            margin-bottom:24px;
            font-size: 2.4rem;
            letter-spacing: 1;
            color:rgb(8, 39, 39);
        }
        table{
            width:100%;
            border-collapse:collapse;
            background: #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .calender-section th,.calender-section td{
            padding:12px;
            border:1px solid #ddd;
        }
        .calender-section th{
            color:#fff;
            background-color: rgb(14, 57, 57);

        }
    </style>
</head>
<body>
    <div class="calender-section">
        <h2>New Zion Calender of Activities</h2>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Activity</th>
                    <th>Event</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Sep 28,2025</td>
                    <td>Outreach program</td>
                    <td>At Nyachwa church</td>
                </tr>
                <tr>
                    <td>Oct 05,2025</td>
                    <td>Voluteer Activities</td>
                    <td>Mombasa Beach</td>
                </tr>
                <tr>
                    <td>Oct 13,2025</td>
                    <td>Community Awareness</td>
                    <td>MailiMbili Church</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
