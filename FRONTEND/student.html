<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin:0;
            min-height: 100vh;
            display:flex;
            flex-direction: column;
            align-items:center;
            justify-content: flex-start;
            padding:0;
        }
        .container{
            background-color: #f2f2f2;
            width:100%;
            max-width:480px;
            padding: 36px 36px 28px 18px;
            border-radius:10px;
            box-shadow:0 10px 25px black;
            align-items:center;
            justify-content: center;
            margin-bottom:18px;
            margin:auto;
            font-size: 24px;
        }
        .container h2{
            margin-bottom:24px;
            font-size:2rem;
            color:black;
            font-family: 'poppins';
            font-weight:700;
            letter-spacing:1px;
        }
        label{
            display:block;
            letter-spacing:0.5px;
            color:teal;
            font-size:1rem;
            font-weight:600;
            margin-top:18px;
        }
        input,select{
            width:100%;
            padding:13px;
            margin-top:7px;
            outline:none;
            transition:border-color 0.3s;
            background: white;
            font-family:inherit;
            border-radius:8px;
            border:1.5px solid gray;

        }
        input:focus,select:focus{
            border-color:darkslateblue;
            background: #eef2fb;
        }
        button{
            margin-top:18px;
            width:100%;
            padding:15px;
            border:none;
            border-radius:8px;
            background:darkslateblue;
            font-size: 1.15rem;
            color:white;
            transition: background 0.3s, box-shadow 0.3s;
      box-shadow:0 20px 25px rgb(58, 41, 66);
      border-bottom:5px;
        }
        @media(max-width:600px){
            .container{
                padding:18px 8px 18px 8px;
            }
        }
        .error{
            color:red;
            font-size: 1rem;
            margin:4px 0;
            text-align:left;
        }
      
    </style>
</head>
<body>
    <div class="container">
     
        <h2>Registration</h2>
        <div id="errorContainer"></div>
        <form action="student.php" name="regForm" id="regForm" method="POST" onsubmit="return validateRegForm()" enctype="multipart/form-data">
            <label for="Fname">Full Name:</label>
            <input type="text" name="fullname"placeholder="Enter your fullname" id="fname"required>
            <span class="error" id="error-fullname"></span>
            <label for="username">Username:</label>
            <input type="text" name="username" id="username"placeholder="Enter your username"required>
            <span class="error" id="error-username"></span>
            <label for="number">Phone Number:</label>
            <input type="tel" name="phone" id="phone"placeholder="Enter your Contact" required>
            <span class="error" id="error-phone"></span>
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="Enter your email"required>
            <span class="error" id="error-email"></span>
            <label for="county">Select Your County:</label>
            <select id="county" name="county" required>
                

                <option value="">-- Select your County</option>
                <option value="mombasa">Mombasa</option>
                <option value="nairobi">Nairobi</option>
                <option value="nakuru">Nakuru</option>
                <option value="homabay">Homabay</option>
                <option value="siaya">Siaya</option>
                <option value="kisumu">Kisumu</option>
                <option value="migori">Migori</option>
                <option value="bungoma">Bungoma</option>
            </select>
            <span class="error" id="error-county"></span>
            <label for="password">Password:</label>
            <input type="password" name="password" id="password" placeholder="Enter your password"required>
            <span class="error" id="error-password"></span>
            <label for="confirmpassword">Confirm Password</label>
            <input type="password" name="confirmpassword" id="confirmpassword" placeholder="Confirm your password"required>
            <span class="error" id="error-confirmpassword"></span>
            <button type="submit" onclick="location.href='ministry.html'">Register</button>
        </form>

    </div>
    <script>
    
function validateRegForm() {
    const form = document.getElementById('regForm');
    const name = form['fullname'].value.trim();
    const username = form['username'].value.trim();
    const phone = form['phone'].value.trim();
    const email = form['email'].value.trim();
    const county = form['county'].value.trim();
    const password = form['password'].value.trim();
    const confirmpassword = form['confirmpassword'].value.trim();

    // Clear all error spans
    document.getElementById('error-fullname').textContent = '';
    document.getElementById('error-username').textContent = '';
    document.getElementById('error-phone').textContent = '';
    document.getElementById('error-email').textContent = '';
    document.getElementById('error-county').textContent = '';
    document.getElementById('error-password').textContent = '';
    document.getElementById('error-confirmpassword').textContent = '';

    let valid = true;

    if (name.length < 2) {
        document.getElementById('error-fullname').textContent = "Full name must be at least 2 characters.";
        valid = false;
    }
    const emailPattern = /^[^@]+@[^@]+\.[a-z]{2,}$/i;
    if (!emailPattern.test(email)) {
        document.getElementById('error-email').textContent = "Enter a valid email address!";
        valid = false;
    }
    const phonePattern = /^[0-9]{10,15}$/;
    if (!phonePattern.test(phone)) {
        document.getElementById('error-phone').textContent = "Enter a valid phone number!";
        valid = false;
    }
    const usernamePattern = /^[a-zA-Z0-9_-]{4,15}$/;
    if (!usernamePattern.test(username)) {
        document.getElementById('error-username').textContent = "Username must be 4-15 characters (letters, numbers, underscore, hyphen).";
        valid = false;
    }
    if (password.length < 6) {
        document.getElementById('error-password').textContent = "Password must be at least 6 characters.";
        valid = false;
    } else if (
        !/[A-Z]/.test(password) ||
        !/[a-z]/.test(password) ||
        !/[0-9]/.test(password)
    ) {
        document.getElementById('error-password').textContent = "Password must contain uppercase, lowercase and a number.";
        valid = false;
    }
    if (password !== confirmpassword) {
        document.getElementById('error-confirmpassword').textContent = "Passwords do not match.";
        valid = false;
    }
    if (county === "") {
        document.getElementById('error-county').textContent = "Please select your county.";
        valid = false;
    }

    return valid;
}
    </script>
    <!--This is the php code to validating a form-->
    
</body>
</html>
