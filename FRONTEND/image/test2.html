<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height:100px;
            width:100px;
            background: red;
            position:relative;
            animation:myAnimation 5s linear 2s infirnite alternate;
        }
        @keyframes myAnimation{
            0%{background: red;left:0px;top:0px;}
            25%{background:yellow;left:200px;top:0px;}
            50%{background:green;left:200px;top:200px;}
            75%{background:blue;left:0px;top:200px;}
            100%{background: red;left:0px;top:0px;}
        }
    </style>
</head>
<body>
    <h2>This a animation test by John Katana</h2>
    <p>Welcome to start programming by john katana</p>
    <div></div>
</body>
</html>
