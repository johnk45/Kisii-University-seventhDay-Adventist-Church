<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter Html</title>

    <style>
        .filter-buttons{
            text-align:center;
            margin:40px auto 20px;
                    }
                    .filter-buttons button{
                        padding:10px 20px;
                        margin-left:15px;
                        background: goldenrod;
                        color:#f9f9f9;
                        border:none;
                        cursor:pointer;
                        border-radius:10px;
                        transition:all 0.3s ease;
                        font-size: 14px;
                        font-weight: 700;

                    }
                    .filter-buttons button:hover,.filter-buttons button:active{
                        background: purple;
                        font-weight: bold;
                    }
        .gallery-container{
           display:grid;
           grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
           gap:20px;
           max-width:1200px;
           margin:0 auto;
           padding:20px;

        }
        .gallery-item{
            position:relative;
            overflow: hidden;
            border-radius:12px;
            box-shadow:0 40px 25px rgba(0,0,0,0.18);
            cursor:pointer;
            scroll-behavior: smooth;

        }
        .gallery-item img{
            width:100%;
            height:100%;
            object-fit:cover;
            transition:transform 0.4s ease,0.4s box-shadow;
        }
        .gallery-item:hover img{
            transform:scale(1.1);
        }
    </style>
</head>
<body>

    <div class="filter-buttons">
                     <button data-filter="all">All</button>
                     <button data-filter="Faith">Faith</button>
                     <button data-filter="Youth">Youth</button>
</div>
    <div class="gallery-container">
        <div class="gallery-item" data-category="Faith">
            <img src="image/church.jpg" alt="Faith-Sermon">
                    </div>

                    <div class="gallery-item" data-category="Youth">
                        <img src="image/congregration.jpg" alt="Youth-Events">
                     </div>

                     <div class="gallery-item" data-category="Faith">
                        <img src="image/mm2.jpg" alt="Medical-Missionary">
                     </div>


</div>
                
</body>
</html>


<script>
    const filterButtons = document.querySelectorAll('.filter-buttons');
    const galleryItems = document.querySelectorAll('.gallery-item');

filterButtons.addEventListener(button=>{
    const filter = button.getAttribute('data-filter');

    galleryItems.forEach(item=>{
        if(filter == "all" || item.dataset.category ===filter){
            item.style.display = "block";
        }else{
            item.style.display = "none";
        }
    });
});
</script>
