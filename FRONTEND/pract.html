<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle | Practise</title>
    <style>
        header{
            background:rgba(0,0,0,0.4);
            backdrop-filter:blur(10px);
            padding:1rem 8%;
            display:flex;
            justify-content:center;
            align-items:center;
            position:sticky;
            top:0;
            z-index:100;
        }
        nav{
            display:flex;
            align-items:center;
            paddin:1.5rem;
        }
        nav a{
            text-decoration:none;
            color:#fff;
            font-weight:500;
            transition:0.3s;
        }
        nav a:hover{
            color:#ffd700;
        }
        .menu-toggle{
            display:none;
            flex-direction:column;
            cursor:pointer;
            gap:5px;
        }
        @media(max-width:768px){
            nav{
                display:none;
                position:absolute;
                top:70px;
                right:8%;
                flex-direction:column;
                background:rgba(0,0,0,0.84);
                padding:1rem;
                border-radius:8px;
            }
            .menu-toggle{
                display:flex;
            }
            nav .active{
                display:flex;
            }
        }

        </style>
</head>
<body>
    <header>
        <h2>KSUSDA</h2>
        <nav id="navMenu">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="sermon.html">Sermon</a>
            <a href="index2.html">Announcement</a>
        </nav>
        <div class="menu-toggle" onclick="toggleMenu()">
            <div></div><div></div><div></div>
        </div>
    </header>
</body>
</html>

<script>
    function toggleMenu(){
        const nav=document.getElementById("navMenu");
        nav.classList.toggle('active');

    }
    </script>
