<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KSUSDA</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 10px 20px;
    }

    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
    }

    /* Toggle button is ALWAYS visible */
    .menu-toggle-button {
      font-size: 24px;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
    }

    .navbar-nav {
      display: none; /* hidden by default */
    }

    .navbar-nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column; /* dropdown style */
      gap: 10px;
      background: #34495e;
      padding: 10px;
    }

    .navbar-nav ul li a {
      color: white;
      text-decoration: none;
      padding: 8px;
      display: block;
    }

    .navbar-nav ul li a:hover {
      background: #1abc9c;
    }

    /* Show menu when "show" class is added */
    .navbar-nav.show {
      display: block;
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-container">
      <div class="logo">KSUSDA</div>
      <button id="menu-toggle" class="menu-toggle-button">☰</button>
    </div>
    <nav id="navbar-nav" class="navbar-nav">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <script>
    const toggleBtn = document.getElementById("menu-toggle");
    const navMenu = document.getElementById("navbar-nav");

    toggleBtn.addEventListener("click", () => {
      navMenu.classList.toggle("show");
      // Change icon between ☰ and ✖
      toggleBtn.textContent = navMenu.classList.contains("show") ? "✖" : "☰";
    });
  </script>
</body
