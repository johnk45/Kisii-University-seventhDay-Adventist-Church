<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KUSDA Sermons – Interactive</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Poppins", sans-serif;
      background: #f8f9fb;
      color: #222;
      transition: background 0.4s, color 0.4s;
    }
    body.dark {
      background: #1c1c1c;
      color: #f5f5f5;
    }

    header {
      background: linear-gradient(135deg, #4a6cf7, #6a8eff);
      color: white;
      text-align: center;
      padding: 2rem 1rem;
      position: relative;
    }

    h1 { font-size: 2rem; margin-bottom: 0.5rem; }

    .dark-toggle {
      position: absolute;
      top: 15px;
      right: 20px;
      background: white;
      color: #333;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    body.dark .dark-toggle {
      background: #333;
      color: white;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      background: white;
      padding: 1rem;
      border-bottom: 1px solid #ddd;
    }
    body.dark .filters {
      background: #2c2c2c;
      border-color: #555;
    }

    .filters input,
    .filters select,
    .filters button {
      padding: 0.6rem 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      outline: none;
    }
    body.dark .filters input,
    body.dark .filters select,
    body.dark .filters button {
      background: #444;
      color: white;
      border-color: #666;
    }

    .filters button.active {
      background: #4a6cf7;
      color: white;
      border-color: #4a6cf7;
    }

    #sermonsList {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
    }
    .sermon-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.3s;
    }
    body.dark .sermon-card {
      background: #2b2b2b;
      box-shadow: 0 3px 10px rgba(255,255,255,0.05);
    }
    .sermon-card:hover { transform: translateY(-5px); }
    .sermon-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .sermon-info { padding: 1rem; }
    .sermon-info h3 { margin-bottom: 0.3rem; }
    .sermon-info p { margin-bottom: 0.5rem; color: #666; }
    body.dark .sermon-info p { color: #ccc; }

    .sermon-info button {
      background: #4a6cf7;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
      margin-right: 0.3rem;
    }
    .sermon-info button:hover { background: #3652c9; }

    .comments {
      border-top: 1px solid #eee;
      margin-top: 1rem;
      padding-top: 0.5rem;
    }
    .comments h4 { margin-bottom: 0.5rem; }
    .comments textarea {
      width: 100%;
      height: 60px;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      resize: none;
      margin-bottom: 0.5rem;
    }
    .comments button {
      background: #222;
      color: white;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
    }
    .comment-item {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 0.5rem;
      margin-bottom: 0.3rem;
    }
    body.dark .comment-item { background: #3a3a3a; }

    @media (max-width: 600px) {
      .filters { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <header>
    <h1>KUSDA Sermons Library</h1>
    <p>Inspiring messages of faith, hope, and growth</p>
    <button class="dark-toggle" id="darkToggle"> Dark Mode</button>
  </header>

  <section class="filters">
    <input type="text" id="searchInput" placeholder="Search sermons..." />
    <button class="filter-btn active" data-category="all">All</button>
    <button class="filter-btn" data-category="Faith">Faith</button>
    <button class="filter-btn" data-category="Prayer">Prayer</button>
    <button class="filter-btn" data-category="Youth">Youth</button>
  </section>

  <main id="sermonsList"></main>

  <script>
    const sermonsList = document.getElementById('sermonsList');
    const searchInput = document.getElementById('searchInput');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const darkToggle = document.getElementById('darkToggle');

    let favorites = JSON.parse(localStorage.getItem('favorites')) || {};

    const sermons = [
      { id: 1, title: "Faith Over Fear", speaker: "Pr. John Doe", date: "2025-02-10", category: "Faith", image: "image/first2.jpg" },
      { id: 2, title: "Power of Prayer", speaker: "Pr. Mary Atieno", date: "2024-11-05", category: "Prayer", image: "https://via.placeholder.com/400x250?text=Power+of+Prayer" },
      { id: 3, title: "Youth in Christ", speaker: "Elder David Omondi", date: "2023-08-15", category: "Youth", image: "https://via.placeholder.com/400x250?text=Youth+in+Christ" },
      { id: 4, title: "Standing Firm", speaker: "Pr. John Doe", date: "2025-06-22", category: "Faith", image: "https://via.placeholder.com/400x250?text=Standing+Firm" }
    ];

    const comments = JSON.parse(localStorage.getItem('comments')) || {};

    function displaySermons(list) {
      sermonsList.innerHTML = list.map(s => `
        <div class="sermon-card" data-id="${s.id}">
          <img src="${s.image}" alt="${s.title}" loading="lazy">
          <div class="sermon-info">
            <h3>${s.title}</h3>
            <p><strong>${s.speaker}</strong></p>
            <p>${new Date(s.date).toDateString()}</p>
            <button onclick="toggleFavorite(${s.id})">${favorites[s.id] ? '❤️ Favorited' : '🤍 Add Favorite'}</button>
            <button onclick="openModal('${s.title}')">▶ Watch</button>

            <div class="comments">
              <h4>Comments:</h4>
              <div id="commentList-${s.id}">
                ${(comments[s.id] || []).map(c => `<div class='comment-item'>${c}</div>`).join('')}
              </div>
              <textarea id="commentInput-${s.id}" placeholder="Write a comment..."></textarea>
              <button onclick="addComment(${s.id})">Post</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function toggleFavorite(id) {
      favorites[id] = !favorites[id];
      localStorage.setItem('favorites', JSON.stringify(favorites));
      displaySermons(filteredSermons());
    }

    function addComment(id) {
      const input = document.getElementById(`commentInput-${id}`);
      const text = input.value.trim();
      if (!text) return;
      comments[id] = comments[id] || [];
      comments[id].push(text);
      localStorage.setItem('comments', JSON.stringify(comments));
      input.value = '';
      displaySermons(filteredSermons());
    }

    function openModal(title) {
      alert("Playing sermon: " + title);
    }

    function filteredSermons() {
      const search = searchInput.value.toLowerCase();
      const category = document.querySelector('.filter-btn.active').dataset.category;
      return sermons.filter(s =>
        (category === 'all' || s.category === category) &&
        s.title.toLowerCase().includes(search)
      );
    }

    searchInput.addEventListener('input', () => displaySermons(filteredSermons()));
    filterBtns.forEach(btn => btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      displaySermons(filteredSermons());
    }));

    // Dark mode toggle
    darkToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const dark = document.body.classList.contains('dark');
      localStorage.setItem('darkMode', dark);
      darkToggle.textContent = dark ? " Light Mode" : " Dark Mode";
    });

    // Remember dark mode preference
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
      darkToggle.textContent = " Light Mode";
    }

    displaySermons(sermons);
  </script>
</body>
</html>
